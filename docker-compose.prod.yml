services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-megachess}
      POSTGRES_USER: ${POSTGRES_USER:-chess}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chess} -d ${POSTGRES_DB:-megachess}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128m

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chess}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-megachess}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET is required}
      PORT: 3000
      # Full public URLs — also used to build links in transactional emails
      APP_URL: ${APP_URL:?APP_URL is required (e.g. https://myapp.example.com)}
      ADMIN_URL: ${ADMIN_URL:?ADMIN_URL is required (e.g. https://admin.myapp.example.com)}
      # Multiple origins: main web app + admin panel (comma-separated)
      CORS_ORIGIN: ${APP_URL},${ADMIN_URL}
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN}
      ASAAS_ENV: ${ASAAS_ENV:-sandbox}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST is required}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:?SMTP_USER is required}
      SMTP_PASS: ${SMTP_PASS:?SMTP_PASS is required}
      SMTP_FROM: ${SMTP_FROM}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768m

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${APP_URL:?APP_URL is required}
        - VITE_WS_URL=${APP_URL:?APP_URL is required}
    restart: always
    expose:
      - "80"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128m

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      args:
        # VITE_API_URL is baked into the React bundle at build time
        - VITE_API_URL=${ADMIN_URL:?ADMIN_URL is required}
    restart: always
    environment:
      # API_UPSTREAM: api service name inside the Docker network
      API_UPSTREAM: ${API_UPSTREAM:-api:3000}
    expose:
      - "80"
    depends_on:
      - api
    labels:
      - traefik.enable=true
      - traefik.http.routers.admin.rule=Host(`${ADMIN_DOMAIN:?ADMIN_DOMAIN is required (hostname only, no protocol)}`)
      - traefik.http.routers.admin.entrypoints=https
      - traefik.http.routers.admin.tls=true
      - traefik.http.routers.admin.tls.certresolver=letsencrypt
      - traefik.http.services.admin.loadbalancer.server.port=80
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  pg_data:
  redis_data:
  uploads:
