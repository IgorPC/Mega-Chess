services:
  db:
    image: postgres:16-alpine
    container_name: megachess-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-megachess}
      POSTGRES_USER: ${POSTGRES_USER:-chess}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chess} -d ${POSTGRES_DB:-megachess}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: megachess-redis
    restart: always
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: megachess-api
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chess}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-megachess}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 3000
      CORS_ORIGIN: https://megachessonline.pcout.cloud
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: megachess-web
    restart: always
    ports:
      - "80:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.megachess.rule=Host(`megachessonline.pcout.cloud`)"
      - "traefik.http.routers.megachess.entrypoints=https"
      - "traefik.http.routers.megachess.tls=true"
      - "traefik.http.routers.megachess.tls.certresolver=letsencrypt"
      - "traefik.http.services.megachess.loadbalancer.server.port=80"
    depends_on:
      - api

volumes:
  pg_data:
  redis_data:
  uploads:
