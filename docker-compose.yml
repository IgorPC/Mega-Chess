services:
  db:
    image: postgres:16-alpine
    container_name: megachess-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: megachess
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess_secret
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess -d megachess"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: megachess-redis
    ports:
      - "6379:6379"

  api:
    image: node:20-alpine
    container_name: megachess-api-dev
    working_dir: /app
    command: sh -c "npm install && npm run start:dev"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://chess:chess_secret@db:5432/megachess
      REDIS_URL: redis://redis:6379
      JWT_SECRET: megachess_jwt_secret_change_in_prod
      JWT_REFRESH_SECRET: megachess_refresh_secret_change_in_prod
      PORT: 3000
      CORS_ORIGIN: http://localhost
    volumes:
      - ./apps/api:/app
      - api_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: megachess-web-dev
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pg_data:
  api_node_modules:
